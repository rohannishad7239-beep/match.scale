<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahira Tips</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #4b0082, #1a0026);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card */
.card {
    background: rgba(30, 10, 50, 0.95);
    padding: 30px 20px;
    border-radius: 25px;
    width: 90%;
    max-width: 350px;
    text-align: center;
    box-shadow: 0 0 40px rgba(162, 0, 255, 0.5);
}

/* Profile Glow */
.profile-box {
    display: flex;
    justify-content: center;
    margin-bottom: 15px;
}

.profile {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    padding: 5px;
    background: linear-gradient(45deg, #a64dff, #ff00ff);
    box-shadow: 0 0 25px #a64dff;
}

.profile img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
}

/* Title */
.title {
    color: #fff;
    font-size: 26px;
    font-weight: 700;
    margin: 10px 0;
}

/* Subtitle */
.subtitle {
    color: #ccc;
    font-size: 14px;
    margin-bottom: 20px;
}

/* List */
.list {
    text-align: left;
    margin-bottom: 25px;
}

.list p {
    color: #ddd;
    margin: 10px 0;
    font-size: 14px;
}

/* Button */
.btn {
    display: block;
    background: linear-gradient(90deg, #a64dff, #ff00cc);
    color: #fff;
    padding: 14px;
    border-radius: 15px;
    text-decoration: none;
    font-weight: bold;
    font-size: 16px;
    box-shadow: 0 0 20px rgba(255, 0, 200, 0.6);
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px rgba(255, 0, 200, 0.9);
}

/* Footer */
.footer {
    margin-top: 15px;
    font-size: 12px;
    color: #aaa;
}
</style>

</head>

<body>

<div class="card">

    <!-- IMAGE CHANGE HERE -->
    <div class="profile-box">
        <div class="profile">
            <img src="image.com.jpeg">
        </div>
    </div>

    <!-- NAME CHANGE HERE -->
    <div class="title">RN COMPANY (2017) 🔥</div>

    <div class="subtitle">
        Daily cricket insights & match updates सीधे Telegram पर.
    </div>

    <div class="list">
        <p>✔ Accurate match analysis & predictions</p>
        <p>✔ Live match updates & quick alerts</p>
        <p>✔ Pitch report & team insights</p>
        <p>✔ 100% clean & organized information</p>
    </div>

    <!-- LINK CHANGE HERE -->
    <a href="https://t.me/+FydaunHBjDowY2Y9" class="btn">
        Join Channel Now
    </a>

    <div class="footer">Ads by Rohan</div>

</div>

</body>
</html>
